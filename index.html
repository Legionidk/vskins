<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>/vskins_</title>
        <link rel="stylesheet" href="src/style.css" />
    </head>
    <body>
        <header>
            <img src="src/logo.svg" alt="/vskins_ logo" class="vskins-logo" />
        </header>

        <main>
            <div class="filter-block">
                <div class="filter-title">Weapons filters</div>
                <div class="filter-buttons-wrapper">
                    <div class="filter-button">
                        <img
                            src="https://media.valorant-api.com/weapons/a03b24d3-4319-996d-0f8c-94bbfba1dfc7/killstreamicon.png"
                            alt=""
                        />
                    </div>
                </div>
            </div>
            <div class="filter-block">
                <div class="filter-title">Edition filters</div>
                <div class="filter-buttons-wrapper">
                    <div class="filter-button">
                        <img
                            src="https://media.valorant-api.com/contenttiers/60bca009-4182-7998-dee7-b8a2558dc369/displayicon.png"
                            alt=""
                        />
                        <span>Premium Edition</span>
                    </div>
                </div>
            </div>
        </main>

        <footer>
            <img src="src/logo.svg" alt="/vskins_ logo" class="vskins-logo" />
            <span class="footer-text">Fan-made skin viewer builded on <a href="https://valoran-api.com/">valoran-api.com</a></spans>
        </footer>

        <script type="module" src="src/main.js"></script>
    </body>
</html>
